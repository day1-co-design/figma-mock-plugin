<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>목업 테스트</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        --gray-0: #ffffff;
        --gray-100: #f4f4f5;
        --gray-200: #e4e4e7;
        --gray-300: #d4d4d8;
        --gray-400: #a1a1aa;
        --gray-500: #71717a;
        --gray-600: #27272a;
        --gray-700: #18181b;
        --gray-800: #09090b;
        --red-0: #fff7f8;
        --red-500: #ed2040;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 320px;
        height: 480px;
        margin: 0;
        overflow: hidden;
        background: var(--gray-0);
        color: var(--gray-700);
      }

      body {
        font-size: 12px;
        line-height: 1.4;
      }

      button {
        margin: 0;
        font: inherit;
        color: inherit;
      }

      .panel {
        width: 320px;
        height: 480px;
        display: flex;
        flex-direction: column;
        background: var(--gray-0);
      }

      .tabs {
        flex: 0 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 4px;
        height: 41px;
        padding: 6px 8px 0;
        border-bottom: 1px solid var(--gray-300);
      }

      .tab {
        position: relative;
        width: 64px;
        height: 35px;
        border: 0;
        background: transparent;
        color: var(--gray-400);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .tab.active {
        color: var(--gray-700);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1px;
        background: var(--gray-700);
      }

      .scroll-area {
        flex: 1 1 auto;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .form-block {
        padding: 15px 16px 12px;
        border-bottom: 1px solid var(--gray-300);
      }

      .form-block.compact {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .field-label {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 600;
        color: var(--gray-700);
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .chip {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 8px 10px;
        border: 1px solid var(--gray-300);
        border-radius: 17px;
        background: var(--gray-0);
        color: var(--gray-600);
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
      }

      .chip:hover:not(:disabled) {
        background: var(--gray-100);
      }

      .chip.active {
        border-color: var(--red-500);
        background: var(--red-0);
        color: var(--red-500);
      }

      .chip-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
      }

      .chip-icon path {
        stroke: currentColor;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .chip:disabled {
        border-color: var(--gray-200);
        background: var(--gray-100);
        color: var(--gray-400);
        cursor: not-allowed;
      }

      .select-shell {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .select-trigger {
        width: 100%;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 12px;
        border: 1px solid var(--gray-200);
        border-radius: 12px;
        background: var(--gray-0);
        color: var(--gray-700);
        font-size: 11px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
      }

      .select-trigger:disabled {
        background: var(--gray-100);
        color: var(--gray-400);
        cursor: not-allowed;
      }

      .select-trigger-value {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .select-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .select-icon path {
        stroke: var(--gray-500);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .select-shell.open .select-icon {
        transform: rotate(180deg);
      }

      .select-menu {
        display: none;
        overflow: hidden;
        flex-direction: column;
        gap: 2px;
        padding: 6px 8px;
        border: 1px solid var(--gray-200);
        border-radius: 12px;
        background: var(--gray-0);
      }

      .select-shell.open .select-menu {
        display: flex;
      }

      .select-option {
        width: 100%;
        min-height: 26px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        padding: 4px 6px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--gray-500);
        font-size: 11px;
        font-weight: 400;
        text-align: left;
        cursor: pointer;
      }

      .select-option:hover:not(:disabled) {
        background: var(--gray-100);
      }

      .select-option.active {
        color: var(--gray-700);
        font-weight: 500;
      }

      .select-option-label {
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .select-option-check {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .select-option-check path {
        stroke: currentColor;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .select-option:disabled {
        background: var(--gray-100);
        color: var(--gray-400);
        cursor: not-allowed;
      }

      .footer {
        flex: 0 0 auto;
        padding: 10px 16px 16px;
        background: var(--gray-0);
      }

      .footer.has-scroll-shadow {
        box-shadow: 0 -5px 10px 0 rgba(0, 0, 0, 0.05);
      }

      .notice {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        min-height: 15px;
        margin: 0 0 8px;
        color: var(--gray-500);
        font-size: 11px;
        font-weight: 400;
        text-align: center;
      }

      .notice-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
      }

      .notice-icon path {
        stroke: var(--gray-500);
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .action-button {
        width: 100%;
        height: 43px;
        border: 1px solid var(--gray-700);
        border-radius: 6px;
        background: var(--gray-700);
        color: var(--gray-0);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .action-button:disabled {
        border-color: var(--gray-200);
        background: var(--gray-200);
        color: var(--gray-400);
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <nav class="tabs" aria-label="mock data tab">
        <button class="tab active" data-tab="profile" type="button">프로필</button>
        <button class="tab" data-tab="class" type="button">클래스</button>
      </nav>

      <div class="scroll-area">
        <section class="form-block">
          <p class="field-label">데이터 종류</p>
          <div class="chip-row" id="dataKindGroup"></div>
        </section>

        <section class="form-block" id="dataTypeBlock">
          <p class="field-label">데이터 유형 선택</p>
          <div id="dataTypeSelect"></div>
        </section>

        <section class="form-block" id="categoryBlock">
          <p class="field-label">카테고리 선택</p>
          <div id="categorySelect"></div>
        </section>
      </div>

      <footer class="footer">
        <p class="notice" id="noticeText">
          <svg class="notice-icon" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M7.5 5.25V8.25"></path>
            <path d="M7.5 10.5H7.50667"></path>
            <path d="M6.22273 2.53461L1.40023 10.6971C1.28795 10.8894 1.22866 11.108 1.22833 11.3306C1.22801 11.5532 1.28666 11.772 1.39838 11.9647C1.51011 12.1573 1.67104 12.3171 1.86446 12.4274C2.05789 12.5378 2.27703 12.5949 2.49973 12.5931H12.1447C12.3674 12.5949 12.5866 12.5378 12.78 12.4274C12.9734 12.3171 13.1344 12.1573 13.2461 11.9647C13.3578 11.772 13.4165 11.5532 13.4161 11.3306C13.4158 11.108 13.3565 10.8894 13.2442 10.6971L8.42173 2.53461C8.30772 2.34838 8.14764 2.19475 7.95695 2.08813C7.76626 1.98152 7.55139 1.92554 7.33294 1.92554C7.11449 1.92554 6.89962 1.98152 6.70893 2.08813C6.51824 2.19475 6.35816 2.34838 6.24415 2.53461H6.22273Z"></path>
          </svg>
          <span>적용할 이미지 레이어를 선택하세요</span>
        </p>
        <button class="action-button" id="applyButton" type="button">선택된 레이어 없음</button>
      </footer>
    </main>

    <script>
      const TEXT_DATA_URLS = [
        "https://day1-co-design.github.io/figma-mock-plugin/data/text-course-info.json"
      ];
      const IMAGE_DATA_URLS = [
        "https://day1-co-design.github.io/figma-mock-plugin/data/image-assets.json"
      ];

      const CATEGORY_OPTIONS = [
        { value: "all", label: "전체" },
        { value: "illust", label: "드로잉" },
        { value: "video", label: "영상 디자인" },
        { value: "baking", label: "베이킹" }
      ];

      const PROFILE_TEXT_TYPE_OPTIONS = [
        { value: "creator_name", label: "크리에이터명" },
        { value: "job_creator", label: "직업 + 크리에이터명" },
        { value: "job_title", label: "직업명" }
      ];

      const CLASS_IMAGE_TYPE_OPTIONS = [
        { value: "thumbnail_list", label: "코스 카드 썸네일" },
        { value: "thumbnail_product", label: "상품 썸네일(1:1)" },
        { value: "thumbnail_cover_pc", label: "상세페이지 커버 - PC" },
        { value: "thumbnail_cover_mobile", label: "상세페이지 커버 - Mobile" }
      ];

      const CLASS_TEXT_TYPE_OPTIONS = [{ value: "course_title", label: "강의 제목" }];

      const state = {
        activeTab: "profile",
        profileDataKind: "avatar",
        classDataKind: "course_image",
        profileDataType: "creator_name",
        classImageDataType: "thumbnail_list",
        classTextDataType: "course_title",
        profileCategory: "all",
        classCategory: "all",
        selectionState: {
          imageCount: 0,
          textCount: 0
        },
        openSelectId: null,
        isApplying: false,
        textDataLoadState: "loading",
        imageDataLoadState: "loading",
        courseInfoData: null,
        imageData: null
      };

      const tabButtons = Array.prototype.slice.call(document.querySelectorAll("[data-tab]"));
      const dataKindGroup = document.getElementById("dataKindGroup");
      const scrollArea = document.querySelector(".scroll-area");
      const footer = document.querySelector(".footer");
      const dataTypeBlock = document.getElementById("dataTypeBlock");
      const dataTypeSelect = document.getElementById("dataTypeSelect");
      const categorySelect = document.getElementById("categorySelect");
      const noticeText = document.getElementById("noticeText");
      const applyButton = document.getElementById("applyButton");

      function getDataKindOptions() {
        if (state.activeTab === "profile") {
          return [
            { value: "avatar", label: "아바타" },
            { value: "creator_info", label: "크리에이터 정보" }
          ];
        }

        return [
          { value: "course_image", label: "코스 이미지" },
          { value: "course_info", label: "강의 정보" }
        ];
      }

      function getCurrentCategory() {
        return state.activeTab === "profile" ? state.profileCategory : state.classCategory;
      }

      function getCurrentDataKind() {
        return state.activeTab === "profile" ? state.profileDataKind : state.classDataKind;
      }

      function getCurrentDataTypeOptions() {
        if (state.activeTab === "profile") {
          return state.profileDataKind === "creator_info" ? PROFILE_TEXT_TYPE_OPTIONS : [];
        }

        if (state.classDataKind === "course_image") {
          return CLASS_IMAGE_TYPE_OPTIONS;
        }

        return CLASS_TEXT_TYPE_OPTIONS;
      }

      function getCurrentDataTypeValue() {
        if (state.activeTab === "profile") {
          return state.profileDataType;
        }

        if (state.classDataKind === "course_image") {
          return state.classImageDataType;
        }

        return state.classTextDataType;
      }

      function setCurrentDataTypeValue(value) {
        if (state.activeTab === "profile") {
          state.profileDataType = value;
          return;
        }

        if (state.classDataKind === "course_image") {
          state.classImageDataType = value;
          return;
        }

        state.classTextDataType = value;
      }

      function shouldShowDataTypeBlock() {
        if (state.activeTab === "profile") {
          return state.profileDataKind === "creator_info";
        }

        return true;
      }

      function isDataTypeDisabled() {
        return state.activeTab === "class" && state.classDataKind === "course_info";
      }

      function getTargetMode() {
        if (state.activeTab === "profile" && state.profileDataKind === "avatar") {
          return "image";
        }

        if (state.activeTab === "class" && state.classDataKind === "course_image") {
          return "image";
        }

        return "text";
      }

      function getSelectionCountForCurrentState() {
        return getTargetMode() === "image"
          ? state.selectionState.imageCount
          : state.selectionState.textCount;
      }

      function flattenCourseInfo(category) {
        if (!state.courseInfoData) {
          return [];
        }

        if (category === "all") {
          return []
            .concat(state.courseInfoData.illust || [])
            .concat(state.courseInfoData.video || [])
            .concat(state.courseInfoData.baking || []);
        }

        return state.courseInfoData[category] || [];
      }

      function flattenProfileImages(category) {
        if (!state.imageData || !state.imageData.profile) {
          return [];
        }

        if (category === "all") {
          return []
            .concat(state.imageData.profile.illust || [])
            .concat(state.imageData.profile.video || [])
            .concat(state.imageData.profile.baking || []);
        }

        return state.imageData.profile[category] || [];
      }

      function flattenThumbnailVariants(category, variant) {
        if (!state.imageData || !state.imageData.thumbnail) {
          return [];
        }

        const source = category === "all"
          ? []
              .concat(state.imageData.thumbnail.illust || [])
              .concat(state.imageData.thumbnail.video || [])
              .concat(state.imageData.thumbnail.baking || [])
          : state.imageData.thumbnail[category] || [];

        return source
          .map(function (item) {
            return {
              courseId: item.courseId,
              url: item.variants && item.variants[variant] ? item.variants[variant] : null
            };
          })
          .filter(function (item) {
            return !!item.url;
          });
      }

      function getTextValuesForCurrentState() {
        const rows = flattenCourseInfo(getCurrentCategory());

        if (state.activeTab === "profile") {
          if (state.profileDataType === "creator_name") {
            return rows.map(function (item) {
              return item.creator_name;
            });
          }

          if (state.profileDataType === "job_creator") {
            return rows.map(function (item) {
              return item.job_title + " " + item.creator_name;
            });
          }

          return rows.map(function (item) {
            return item.job_title;
          });
        }

        return rows
          .map(function (item) {
            return item.course_title || "";
          })
          .filter(function (value) {
            return value.length > 0;
          });
      }

      function getTextSuccessLabel() {
        if (state.activeTab === "profile") {
          const found = PROFILE_TEXT_TYPE_OPTIONS.find(function (item) {
            return item.value === state.profileDataType;
          });
          return found ? found.label : "텍스트";
        }

        return "강의 제목";
      }

      function getCurrentImageUrls() {
        if (state.activeTab === "profile") {
          return flattenProfileImages(getCurrentCategory()).map(function (item) {
            return {
              name: item.name,
              url: item.url
            };
          });
        }

        return flattenThumbnailVariants(getCurrentCategory(), state.classImageDataType).map(function (item) {
          return {
            name: item.courseId + "-" + state.classImageDataType,
            url: item.url
          };
        });
      }

      function getImageSuccessLabel() {
        if (state.activeTab === "profile") {
          return "아바타";
        }

        const found = CLASS_IMAGE_TYPE_OPTIONS.find(function (item) {
          return item.value === state.classImageDataType;
        });
        return found ? found.label : "코스 이미지";
      }

      function renderTabs() {
        for (const button of tabButtons) {
          button.classList.toggle("active", button.getAttribute("data-tab") === state.activeTab);
        }
      }

      function renderDataKindButtons() {
        dataKindGroup.innerHTML = "";
        const currentDataKind = getCurrentDataKind();

        for (const option of getDataKindOptions()) {
          const isActive = option.value === currentDataKind;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "chip";
          button.classList.toggle("active", isActive);

          if (isActive) {
            button.insertAdjacentHTML("beforeend", getCheckSvg("chip-icon"));
          }

          const label = document.createElement("span");
          label.textContent = option.label;
          button.appendChild(label);

          button.addEventListener("click", function () {
            if (state.activeTab === "profile") {
              state.profileDataKind = option.value;
            } else {
              state.classDataKind = option.value;
            }
            state.openSelectId = null;
            render();
          });
          dataKindGroup.appendChild(button);
        }
      }

      function getCheckSvg(className) {
        return [
          '<svg class="' + className + '" viewBox="0 0 18 18" fill="none" aria-hidden="true">',
          '<path d="M14.25 5.25L7.125 12.375L3.75 9"></path>',
          '</svg>'
        ].join("");
      }

      function getChevronSvg() {
        return [
          '<svg class="select-icon" viewBox="0 0 18 18" fill="none" aria-hidden="true">',
          '<path d="M5.4 6.9L9 10.5L12.6 6.9"></path>',
          '</svg>'
        ].join("");
      }

      function renderSelect(target, config) {
        target.innerHTML = "";

        const shell = document.createElement("div");
        shell.className = "select-shell";
        if (state.openSelectId === config.id && !config.disabled) {
          shell.classList.add("open");
        }

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "select-trigger";
        trigger.disabled = !!config.disabled;
        trigger.innerHTML = '<span class="select-trigger-value"></span>' + getChevronSvg();

        const valueNode = trigger.querySelector(".select-trigger-value");
        const selectedOption = config.options.find(function (item) {
          return item.value === config.value;
        });
        valueNode.textContent = selectedOption ? selectedOption.label : config.placeholder;

        trigger.addEventListener("click", function (event) {
          event.stopPropagation();
          if (config.disabled) {
            return;
          }
          state.openSelectId = state.openSelectId === config.id ? null : config.id;
          render();
        });

        const menu = document.createElement("div");
        menu.className = "select-menu";

        for (const option of config.options) {
          const isActive = option.value === config.value;
          const optionButton = document.createElement("button");
          optionButton.type = "button";
          optionButton.className = "select-option";
          optionButton.classList.toggle("active", isActive);

          const optionLabel = document.createElement("span");
          optionLabel.className = "select-option-label";
          optionLabel.textContent = option.label;
          optionButton.appendChild(optionLabel);

          if (isActive) {
            optionButton.insertAdjacentHTML("beforeend", getCheckSvg("select-option-check"));
          }

          optionButton.addEventListener("click", function () {
            config.onSelect(option.value);
            state.openSelectId = null;
            render();
          });
          menu.appendChild(optionButton);
        }

        shell.appendChild(trigger);
        shell.appendChild(menu);
        target.appendChild(shell);
      }

      function renderDataTypeBlock() {
        const shouldShow = shouldShowDataTypeBlock();
        dataTypeBlock.style.display = shouldShow ? "block" : "none";

        if (!shouldShow) {
          dataTypeSelect.innerHTML = "";
          return;
        }

        renderSelect(dataTypeSelect, {
          id: "dataType",
          options: getCurrentDataTypeOptions(),
          value: getCurrentDataTypeValue(),
          placeholder: "데이터 유형 선택",
          disabled: isDataTypeDisabled(),
          onSelect: function (value) {
            setCurrentDataTypeValue(value);
          }
        });
      }

      function renderCategoryBlock() {
        renderSelect(categorySelect, {
          id: "category",
          options: CATEGORY_OPTIONS,
          value: getCurrentCategory(),
          placeholder: "카테고리 선택",
          disabled: false,
          onSelect: function (value) {
            if (state.activeTab === "profile") {
              state.profileCategory = value;
            } else {
              state.classCategory = value;
            }
          }
        });
      }

      function renderFooter() {
        const targetMode = getTargetMode();
        const selectionCount = getSelectionCountForCurrentState();
        const hasScrollableContent = scrollArea.scrollHeight > scrollArea.clientHeight + 1;
        const isLoading =
          (targetMode === "image" && state.imageDataLoadState === "loading") ||
          (targetMode === "text" && state.textDataLoadState === "loading");
        const isError =
          (targetMode === "image" && state.imageDataLoadState === "error") ||
          (targetMode === "text" && state.textDataLoadState === "error");

        footer.classList.toggle("has-scroll-shadow", hasScrollableContent);

        const shouldShowNotice = selectionCount === 0;
        noticeText.lastElementChild.textContent =
          targetMode === "image" ? "적용할 이미지 레이어를 선택하세요" : "적용할 텍스트 레이어를 선택하세요";
        noticeText.style.display = shouldShowNotice ? "flex" : "none";
        noticeText.setAttribute("aria-hidden", shouldShowNotice ? "false" : "true");

        if (state.isApplying || isLoading) {
          applyButton.disabled = true;
          applyButton.textContent = "불러오는 중...";
          return;
        }

        if (isError) {
          applyButton.disabled = true;
          applyButton.textContent = "데이터 로드 실패";
          return;
        }

        if (selectionCount === 0) {
          applyButton.disabled = true;
          applyButton.textContent = "선택된 레이어 없음";
          return;
        }

        const hasValues = targetMode === "image"
          ? getCurrentImageUrls().length > 0
          : getTextValuesForCurrentState().length > 0;

        applyButton.disabled = !hasValues;
        applyButton.textContent =
          "선택한 " +
          String(selectionCount) +
          (targetMode === "image" ? " 이미지 레이어에 적용" : " 텍스트 레이어에 적용");
      }

      function render() {
        renderTabs();
        renderDataKindButtons();
        renderDataTypeBlock();
        renderCategoryBlock();
        renderFooter();
      }

      async function fetchJsonWithFallback(urls) {
        let lastError = null;

        for (const url of urls) {
          try {
            const response = await fetch(url);
            if (!response.ok) {
              throw new Error("status " + String(response.status));
            }
            return await response.json();
          } catch (error) {
            lastError = error;
            console.warn("[Data] failed to load from", url, error);
          }
        }

        throw lastError || new Error("데이터를 불러오지 못했어요.");
      }

      async function ensureTextData() {
        if (state.courseInfoData) {
          return state.courseInfoData;
        }

        state.textDataLoadState = "loading";
        render();

        try {
          state.courseInfoData = await fetchJsonWithFallback(TEXT_DATA_URLS);
          state.textDataLoadState = "ready";
          render();
          return state.courseInfoData;
        } catch (error) {
          state.textDataLoadState = "error";
          render();
          throw error;
        }
      }

      async function ensureImageData() {
        if (state.imageData) {
          return state.imageData;
        }

        state.imageDataLoadState = "loading";
        render();

        try {
          state.imageData = await fetchJsonWithFallback(IMAGE_DATA_URLS);
          state.imageDataLoadState = "ready";
          render();
          return state.imageData;
        } catch (error) {
          state.imageDataLoadState = "error";
          render();
          throw error;
        }
      }

      async function loadImageAsset(imageItem) {
        const response = await fetch(imageItem.url);

        if (!response.ok) {
          throw new Error("이미지 응답 오류: " + imageItem.url + " / status " + String(response.status));
        }

        const contentType = response.headers.get("content-type") || "";
        if (
          contentType.indexOf("image/png") === -1 &&
          contentType.indexOf("image/jpeg") === -1 &&
          contentType.indexOf("image/gif") === -1
        ) {
          throw new Error("지원되지 않는 이미지 타입: " + imageItem.url + " / " + contentType);
        }

        const arrayBuffer = await response.arrayBuffer();
        return {
          name: imageItem.name,
          bytes: new Uint8Array(arrayBuffer)
        };
      }

      async function handleApply() {
        if (applyButton.disabled || state.isApplying) {
          return;
        }

        const targetMode = getTargetMode();

        if (targetMode === "image") {
          state.isApplying = true;
          render();

          try {
            await ensureImageData();
            const sourceItems = getCurrentImageUrls();
            const imageAssets = [];

            for (const item of sourceItems) {
              imageAssets.push(await loadImageAsset(item));
            }

            parent.postMessage(
              {
                pluginMessage: {
                  type: "apply-image-random",
                  imageAssets: imageAssets,
                  successLabel: getImageSuccessLabel()
                }
              },
              "*"
            );
          } finally {
            state.isApplying = false;
            render();
          }

          return;
        }

        await ensureTextData();
        parent.postMessage(
          {
            pluginMessage: {
              type: "apply-random",
              values: getTextValuesForCurrentState(),
              successLabel: getTextSuccessLabel()
            }
          },
          "*"
        );
      }

      window.onmessage = function (event) {
        const pluginMessage = event.data && event.data.pluginMessage;
        if (!pluginMessage) {
          return;
        }

        if (pluginMessage.type === "selection-state") {
          state.selectionState = {
            imageCount: pluginMessage.imageCount || 0,
            textCount: pluginMessage.textCount || 0
          };
          render();
        }
      };

      document.addEventListener("click", function () {
        if (state.openSelectId !== null) {
          state.openSelectId = null;
          render();
        }
      });

      for (const button of tabButtons) {
        button.addEventListener("click", function (event) {
          state.activeTab = event.currentTarget.getAttribute("data-tab");
          state.openSelectId = null;
          render();
        });
      }

      applyButton.addEventListener("click", function () {
        handleApply().catch(function (error) {
          console.error(error);
          state.isApplying = false;
          render();
          parent.postMessage(
            {
              pluginMessage: {
                type: "show-toast",
                message: "데이터를 불러오지 못했어요. Pages 설정을 확인해 주세요."
              }
            },
            "*"
          );
        });
      });

      parent.postMessage({ pluginMessage: { type: "request-selection-state" } }, "*");

      Promise.allSettled([ensureTextData(), ensureImageData()]).finally(function () {
        render();
      });

      render();
    </script>
  </body>
</html>
