<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Coloso Mock Data</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        --bg: #ffffff;
        --text: #18181b;
        --muted: #a1a1aa;
        --line: #d4d4d8;
        --line-strong: #dcdcdc;
        --chip: #ffffff;
        --chip-active: #27272a;
        --chip-active-text: #ffffff;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 320px;
        height: 520px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      body {
        font-size: 12px;
      }

      button {
        font: inherit;
      }

      .panel {
        width: 320px;
        height: 520px;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }

      .tabs {
        flex: 0 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 6px 8px 0;
        height: 41px;
        border-bottom: 1px solid var(--line-strong);
      }

      .tab {
        position: relative;
        width: 64px;
        height: 35px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .tab.active {
        color: var(--text);
        font-weight: 500;
      }

      .tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1px;
        background: var(--text);
      }

      .scroll-area {
        flex: 1 1 auto;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 0;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .section-header {
        display: flex;
        align-items: center;
        height: 46px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
      }

      .section-header.split {
        justify-content: space-between;
      }

      .section-header.with-line {
        border-top: 1px solid var(--line-strong);
      }

      .section-title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .section-header.center-title {
        position: relative;
        justify-content: center;
      }

      .section-header.center-title .section-title {
        text-align: center;
      }

      .section-action {
        border: 0;
        background: transparent;
        color: var(--text);
        line-height: 1;
        width: 18px;
        height: 18px;
        padding: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .section-header.center-title .section-action {
        position: absolute;
        left: 16px;
      }

      .image-view {
        display: none;
      }

      .image-view.active {
        display: block;
      }

      .block {
        padding: 10px 16px 12px;
      }

      .button-block {
        margin-top: 0;
        margin-bottom: 0;
        padding: 12px 16px 0;
        background: transparent;
      }

      .block + .block {
        border-top: 1px solid transparent;
      }

      .field-label {
        margin: 0 0 8px;
        padding-left: 2px;
        font-size: 12px;
        font-weight: 500;
        color: #27272a;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 6px;
      }

      .chip {
        height: 34px;
        border: 1px solid var(--line);
        background: var(--chip);
        color: var(--text);
        border-radius: 999px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .chip.active {
        border-color: var(--text);
        background: var(--chip-active);
        color: var(--chip-active-text);
      }

      .chip.disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .helper {
        margin: 14px 16px 0;
        font-size: 11px;
        line-height: 1.55;
        color: #686868;
      }

      .status-text {
        margin: 14px 16px 0;
        font-size: 11px;
        line-height: 1.55;
        color: #686868;
      }

      .dev-only {
        display: none;
      }

      .creator-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .creator-item {
        width: 100%;
        min-height: 45px;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        border-radius: 0;
        padding: 0 20px;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .creator-item.active {
        background: transparent;
        color: var(--text);
      }

      .creator-item-check {
        width: 16px;
        height: 16px;
        border: 1px solid var(--text);
        border-radius: 4px;
        flex: 0 0 auto;
        position: relative;
      }

      .creator-item.active .creator-item-check {
        background: var(--text);
      }

      .creator-item.active .creator-item-check::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2px;
        width: 4px;
        height: 8px;
        border-right: 1.5px solid #ffffff;
        border-bottom: 1.5px solid #ffffff;
        transform: rotate(45deg);
      }

      .creator-item-label {
        font-size: 14px;
        font-weight: 500;
        line-height: 1.2;
      }

      .creator-filter-block {
        padding: 12px 16px 12px;
        border-bottom: 1px solid var(--line);
      }

      .border-gap-block {
        padding-bottom: 12px;
      }

      .creator-list-block {
        padding-top: 13px;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        display: block;
        flex: 0 0 auto;
      }

      .nav-icon path {
        stroke: #09090b;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-icon.back {
        transform: rotate(180deg);
      }

      .footer {
        flex: 0 0 auto;
        padding: 12px 16px 16px;
        border-top: 0;
        background: #ffffff;
      }

      .action-button {
        width: 100%;
        height: 41px;
        border: 1px solid var(--text);
        border-radius: 6px;
        background: var(--text);
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }

      .action-button:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <nav class="tabs" aria-label="Mock data tabs">
        <button class="tab active" data-tab="image" type="button">Image</button>
        <button class="tab" data-tab="text" type="button">Text</button>
      </nav>

      <div class="scroll-area">
        <section class="page active" data-page="image">
          <div class="image-view active" id="imageMainView">
            <div class="section-header split">
              <h2 class="section-title">Avatar</h2>
              <button class="section-action" id="openCreatorPageButton" type="button" aria-label="creator list">
                <svg class="nav-icon" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  <path d="M7 5.5L10.5 9L7 12.5"></path>
                </svg>
              </button>
            </div>

            <div class="block button-block">
              <p class="field-label">Type</p>
              <div class="chip-row" id="imageTypeGroup">
                <button class="chip" data-image-type="creator" type="button">creator</button>
              </div>
            </div>

            <div class="block button-block border-gap-block">
              <p class="field-label">Category</p>
              <div class="chip-row" id="imageCategoryGroup">
                <button class="chip" data-image-category="illust" type="button">illustration</button>
                <button class="chip" data-image-category="video" type="button">Video</button>
                <button class="chip" data-image-category="baking" type="button">baking</button>
              </div>
            </div>

            <div class="section-header with-line">
              <h2 class="section-title">Course Thumbnail</h2>
            </div>

            <div class="block button-block">
              <p class="field-label">Type</p>
              <div class="chip-row" id="thumbnailTypeGroup">
                <button class="chip" data-image-type="thumbnail_cover_mobile" type="button">cover mobile</button>
                <button class="chip" data-image-type="thumbnail_cover_pc" type="button">cover pc</button>
                <button class="chip" data-image-type="thumbnail_list" type="button">list</button>
                <button class="chip" data-image-type="thumbnail_product" type="button">product</button>
              </div>
            </div>

            <div class="block button-block">
              <p class="field-label">Category</p>
              <div class="chip-row" id="thumbnailCategoryGroup">
                <button class="chip" data-thumbnail-category="illust" type="button">illustration</button>
                <button class="chip" data-thumbnail-category="video" type="button">Video</button>
                <button class="chip" data-thumbnail-category="baking" type="button">baking</button>
              </div>
            </div>

            <p class="status-text dev-only" id="imageStatusText">
              카테고리를 선택한 뒤 creator 이미지를 적용할 수 있어요.
            </p>
          </div>

          <div class="image-view" id="imageCreatorView">
            <div class="section-header center-title">
              <button class="section-action" id="backToImageMainButton" type="button" aria-label="back">
                <svg class="nav-icon back" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  <path d="M7 5.5L10.5 9L7 12.5"></path>
                </svg>
              </button>
              <h2 class="section-title">선택 적용</h2>
            </div>

            <div class="creator-filter-block button-block">
              <div class="chip-row" id="creatorFilterCategoryGroup">
                <button class="chip" data-creator-filter-category="all" type="button">All</button>
                <button class="chip" data-creator-filter-category="illust" type="button">illustration</button>
                <button class="chip" data-creator-filter-category="video" type="button">Video</button>
                <button class="chip" data-creator-filter-category="baking" type="button">baking</button>
              </div>
            </div>

            <div class="creator-list-block">
              <div class="creator-list" id="creatorList"></div>
            </div>

            <p class="status-text dev-only" id="creatorStatusText">
              적용할 크리에이터를 선택해 주세요.
            </p>
          </div>
        </section>

        <section class="page" data-page="text">
          <div class="section-header">
            <h2 class="section-title">Course Info</h2>
          </div>

          <div class="block button-block">
            <p class="field-label">Type</p>
            <div class="chip-row" id="courseInfoTypeGroup">
              <button class="chip" data-text-type="creator_name" type="button">creator</button>
              <button class="chip" data-text-type="job_title" type="button">job</button>
              <button class="chip" data-text-type="job_creator" type="button">job + creator</button>
              <button class="chip" data-text-type="course_title" type="button">course title</button>
            </div>
          </div>

          <div class="block button-block border-gap-block">
            <p class="field-label">Category</p>
            <div class="chip-row" id="courseCategoryGroup">
              <button class="chip" data-course-category="illust" type="button">illustration</button>
              <button class="chip" data-course-category="video" type="button">Video</button>
              <button class="chip" data-course-category="baking" type="button">baking</button>
            </div>
          </div>

          <div class="section-header with-line">
            <h2 class="section-title">Data</h2>
          </div>

          <div class="block button-block">
            <div class="chip-row" id="generalTypeGroup">
              <button class="chip" data-text-type="date_yyyy" type="button">yyyy.mm.dd</button>
              <button class="chip" data-text-type="date_yy" type="button">yy.mm.dd</button>
            </div>
          </div>

          <p class="helper" id="helperText">
            코스 정보 타입은 Type 1개와 Category 1개를 함께 선택해야 적용됩니다.
          </p>
        </section>
      </div>

      <footer class="footer">
        <button class="action-button" id="randomButton" type="button">적용</button>
      </footer>
    </main>

    <script>
      var state = {
        activeTab: 'image',
        textType: 'creator_name',
        courseCategory: null,
        imageType: 'creator',
        imageCategory: 'baking',
        thumbnailCategory: 'baking',
        creatorFilterCategory: 'all',
        imageView: 'main',
        isApplyingImage: false,
        imageApplyRequestId: 0
      };

      var TEXT_TYPE_LABELS = {
        creator_name: '연사명',
        job_title: '직업명',
        job_creator: '직업명 + 연사명',
        course_title: '코스 타이틀',
        date_yyyy: '날짜형 YYYY.MM.DD',
        date_yy: '날짜형 YY.MM.DD'
      };
      var TEXT_DATA_SOURCE_URLS = [
        'https://day1-co-design.github.io/figma-mock-plugin/data/text-course-info.json',
        'http://localhost:8001/data/text-course-info.json'
      ];
      var courseInfoData = null;
      var textDataLoadState = 'loading';
      var textDataLoadPromise = null;

      var IMAGE_DATA_SOURCE_URLS = [
        'https://day1-co-design.github.io/figma-mock-plugin/data/image-assets.json',
        'http://localhost:8001/data/image-assets.json'
      ];
      var imageData = null;
      var imageDataLoadState = 'loading';
      var imageDataLoadPromise = null;
      var selectedCreatorByCategory = {
        all: null,
        baking: null,
        video: null,
        illust: null
      };

      var helperText = document.getElementById('helperText');

      var imageStatusText = document.getElementById('imageStatusText');
      var creatorStatusText = document.getElementById('creatorStatusText');
      var creatorList = document.getElementById('creatorList');
      var imageMainView = document.getElementById('imageMainView');
      var imageCreatorView = document.getElementById('imageCreatorView');
      var openCreatorPageButton = document.getElementById('openCreatorPageButton');
      var backToImageMainButton = document.getElementById('backToImageMainButton');
      var randomButton = document.getElementById('randomButton');
      var tabButtons = Array.prototype.slice.call(document.querySelectorAll('[data-tab]'));
      var pages = Array.prototype.slice.call(document.querySelectorAll('[data-page]'));
      var typeButtons = Array.prototype.slice.call(document.querySelectorAll('[data-text-type]'));
      var imageTypeButtons = Array.prototype.slice.call(document.querySelectorAll('[data-image-type]'));
      var imageCategoryButtons = Array.prototype.slice.call(document.querySelectorAll('[data-image-category]'));
      var thumbnailCategoryButtons = Array.prototype.slice.call(document.querySelectorAll('[data-thumbnail-category]'));
      var creatorFilterCategoryButtons = Array.prototype.slice.call(
        document.querySelectorAll('[data-creator-filter-category]')
      );
      var categoryButtons = Array.prototype.slice.call(document.querySelectorAll('[data-course-category]'));

      function isCourseInfoType(textType) {
        return (
          textType === 'creator_name' ||
          textType === 'job_title' ||
          textType === 'job_creator' ||
          textType === 'course_title'
        );
      }

      function updateTab(nextTab) {
        state.activeTab = nextTab;

        for (var i = 0; i < tabButtons.length; i += 1) {
          var tabButton = tabButtons[i];
          if (tabButton.getAttribute('data-tab') === nextTab) {
            tabButton.classList.add('active');
          } else {
            tabButton.classList.remove('active');
          }
        }

        for (var j = 0; j < pages.length; j += 1) {
          var page = pages[j];
          if (page.getAttribute('data-page') === nextTab) {
            page.classList.add('active');
          } else {
            page.classList.remove('active');
          }
        }

        updateActionState();
      }

      function updateTypeSelection(nextType) {
        state.textType = nextType;

        for (var i = 0; i < typeButtons.length; i += 1) {
          var button = typeButtons[i];
          if (button.getAttribute('data-text-type') === nextType) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        updateCategoryState();
        updateHelperText();
        updateActionState();
      }

      function updateCourseCategory(nextCategory) {
        state.courseCategory = nextCategory;

        for (var i = 0; i < categoryButtons.length; i += 1) {
          var button = categoryButtons[i];
          if (button.getAttribute('data-course-category') === nextCategory) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        updateHelperText();
        updateActionState();
      }

      function updateImageTypeSelection(nextType) {
        state.imageType = nextType;

        for (var i = 0; i < imageTypeButtons.length; i += 1) {
          var button = imageTypeButtons[i];
          if (button.getAttribute('data-image-type') === nextType) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        updateActionState();
      }

      function updateImageCategorySelection(nextCategory) {
        state.imageCategory = nextCategory;

        for (var i = 0; i < imageCategoryButtons.length; i += 1) {
          var button = imageCategoryButtons[i];
          if (button.getAttribute('data-image-category') === nextCategory) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        renderCreatorList();
        updateImageStatusText();
        updateCreatorStatusText();
        updateActionState();
      }

      function updateThumbnailCategorySelection(nextCategory) {
        state.thumbnailCategory = nextCategory;

        for (var i = 0; i < thumbnailCategoryButtons.length; i += 1) {
          var button = thumbnailCategoryButtons[i];
          if (button.getAttribute('data-thumbnail-category') === nextCategory) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        updateImageStatusText();
        updateActionState();
      }

      function updateCreatorFilterCategory(nextCategory) {
        state.creatorFilterCategory = nextCategory;

        for (var i = 0; i < creatorFilterCategoryButtons.length; i += 1) {
          var button = creatorFilterCategoryButtons[i];
          if (button.getAttribute('data-creator-filter-category') === nextCategory) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        }

        renderCreatorList();
        updateCreatorStatusText();
        updateActionState();
      }

      function updateImageView(nextView) {
        state.imageView = nextView;

        if (nextView === 'creator') {
          imageMainView.classList.remove('active');
          imageCreatorView.classList.add('active');
        } else {
          imageMainView.classList.add('active');
          imageCreatorView.classList.remove('active');
        }

        updateImageStatusText();
        updateCreatorStatusText();
        updateActionState();
      }

      async function ensureImageData() {
        if (imageData) {
          return imageData;
        }

        if (imageDataLoadPromise) {
          return imageDataLoadPromise;
        }

        imageDataLoadState = 'loading';
        updateImageStatusText();
        updateCreatorStatusText();
        updateActionState();

        imageDataLoadPromise = (async function () {
          var lastError = null;

          for (var i = 0; i < IMAGE_DATA_SOURCE_URLS.length; i += 1) {
            var sourceUrl = IMAGE_DATA_SOURCE_URLS[i];

            try {
              var response = await fetch(sourceUrl);
              if (!response.ok) {
                throw new Error('status ' + String(response.status));
              }

              var json = await response.json();
              imageData = json;
              imageDataLoadState = 'ready';
              updateImageStatusText();
              updateCreatorStatusText();
              updateActionState();
              renderCreatorList();
              console.log('[ImageData] loaded from', sourceUrl);
              return imageData;
            } catch (error) {
              lastError = error;
              console.warn('[ImageData] failed to load from', sourceUrl, error);
            }
          }

          imageDataLoadState = 'error';
          imageDataLoadPromise = null;
          updateImageStatusText();
          updateCreatorStatusText();
          updateActionState();
          renderCreatorList();
          throw lastError || new Error('이미지 데이터를 불러오지 못했어요.');
        })();

        return imageDataLoadPromise;
      }

      function getImageCreatorOptions(category) {
        if (!imageData || !imageData.profile) {
          return [];
        }

        if (category === 'all') {
          return []
            .concat(imageData.profile.illust || [])
            .concat(imageData.profile.video || [])
            .concat(imageData.profile.baking || []);
        }

        return imageData.profile[category] || [];
      }

      function getThumbnailVariantOptions(category, imageType) {
        if (!imageData || !imageData.thumbnail) {
          return [];
        }

        var courses = imageData.thumbnail[category] || [];
        var options = [];

        for (var i = 0; i < courses.length; i += 1) {
          var course = courses[i];
          var imageUrl = course.variants[imageType];
          if (imageUrl) {
            options.push({
              courseId: course.courseId,
              url: imageUrl
            });
          }
        }

        return options;
      }

      function getSelectedCreator(category) {

        return selectedCreatorByCategory[category];
      }

      function setSelectedCreator(category, creator) {
        selectedCreatorByCategory[category] = creator;
        renderCreatorList();
        updateImageStatusText();
        updateCreatorStatusText();
        updateActionState();
      }

      function renderCreatorList() {
        creatorList.innerHTML = '';

        var options = getImageCreatorOptions(state.creatorFilterCategory);
        var selectedCreator = getSelectedCreator(state.creatorFilterCategory);

        for (var i = 0; i < options.length; i += 1) {
          var creator = options[i];
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'creator-item';
          var check = document.createElement('span');
          check.className = 'creator-item-check';
          var label = document.createElement('span');
          label.className = 'creator-item-label';
          label.textContent = creator.name;
          button.appendChild(check);
          button.appendChild(label);

          if (selectedCreator && selectedCreator.url === creator.url) {
            button.classList.add('active');
          }

          button.addEventListener('click', (function (nextCreator) {
            return function () {
              setSelectedCreator(state.creatorFilterCategory, nextCreator);
            };
          })(creator));

          creatorList.appendChild(button);
        }
      }

      function updateImageStatusText() {
        if (imageDataLoadState === 'loading') {
          setImageStatus('이미지 데이터를 불러오는 중이에요.');
          return;
        }

        if (imageDataLoadState === 'error') {
          setImageStatus('이미지 데이터를 불러오지 못했어요. GitHub Pages 또는 로컬 서버를 확인해 주세요.');
          return;
        }

        if (state.imageType !== 'creator') {
          setImageStatus('썸네일 타입과 카테고리를 선택한 뒤 적용할 수 있어요.');
          return;
        }

        var selectedCreator = getSelectedCreator(state.imageCategory);

        if (selectedCreator) {
          setImageStatus('선택된 크리에이터: ' + selectedCreator.name + '. > 버튼으로 변경할 수 있어요.');
          return;
        }

        setImageStatus('카테고리를 선택한 뒤 creator 이미지를 적용할 수 있어요.');
      }

      function updateCreatorStatusText() {
        if (imageDataLoadState === 'loading') {
          setCreatorStatus('크리에이터 이미지를 불러오는 중이에요.');
          return;
        }

        if (imageDataLoadState === 'error') {
          setCreatorStatus('크리에이터 이미지를 불러오지 못했어요.');
          return;
        }

        var selectedCreator = getSelectedCreator(state.creatorFilterCategory);

        if (selectedCreator) {
          setCreatorStatus(selectedCreator.name + ' 프로필 이미지를 적용할 준비가 됐어요.');
          return;
        }

        setCreatorStatus('적용할 크리에이터를 선택해 주세요.');
      }

      function updateCategoryState() {
        var enabled = isCourseInfoType(state.textType);

        for (var i = 0; i < categoryButtons.length; i += 1) {
          var button = categoryButtons[i];
          button.disabled = !enabled;
          if (enabled) {
            button.classList.remove('disabled');
          } else {
            button.classList.add('disabled');
          }
        }
      }

      function updateHelperText() {
        if (isCourseInfoType(state.textType)) {
          if (textDataLoadState === 'loading') {
            helperText.textContent = '텍스트 데이터를 불러오는 중이에요.';
            return;
          }

          if (textDataLoadState === 'error') {
            helperText.textContent = '텍스트 데이터를 불러오지 못했어요. GitHub Pages 또는 로컬 서버를 확인해 주세요.';
            return;
          }

          if (!state.courseCategory) {
            helperText.textContent = '코스 정보 타입은 Category를 선택한 뒤 적용할 수 있어요.';
            return;
          }

          helperText.textContent = '선택한 코스 정보 타입과 카테고리 기준으로 데이터가 적용됩니다.';
          return;
        }

        helperText.textContent = '날짜형은 카테고리 선택 없이 오늘부터 3개월 범위 안에서 랜덤 적용돼요.';
      }

      function updateActionState() {
        if (state.activeTab === 'image') {
          if (state.isApplyingImage) {
            randomButton.disabled = true;
            randomButton.textContent = '불러오는 중...';
            return;
          }

          if (imageDataLoadState === 'loading') {
            randomButton.disabled = true;
            randomButton.textContent = '불러오는 중...';
            return;
          }

          if (imageDataLoadState === 'error') {
            randomButton.disabled = true;
            randomButton.textContent = '적용';
            return;
          }

          if (state.imageView === 'creator') {
            randomButton.disabled = !(state.imageType === 'creator' && !!getSelectedCreator(state.creatorFilterCategory));
            randomButton.textContent = '적용';
            return;
          }

          if (state.imageType === 'creator') {
            randomButton.disabled = getImageCreatorOptions(state.imageCategory).length === 0;
            randomButton.textContent = '적용';
            return;
          }

          randomButton.disabled = getThumbnailVariantOptions(state.thumbnailCategory, state.imageType).length === 0;
          randomButton.textContent = '적용';
          return;
        }

        if (isCourseInfoType(state.textType)) {
          if (textDataLoadState === 'loading') {
            randomButton.disabled = true;
            randomButton.textContent = '불러오는 중...';
            return;
          }

          if (textDataLoadState === 'error') {
            randomButton.disabled = true;
            randomButton.textContent = '적용';
            return;
          }

          randomButton.disabled = !state.courseCategory;
          randomButton.textContent = '적용';
          return;
        }

        randomButton.disabled = false;
        randomButton.textContent = '적용';
      }

      async function ensureCourseInfoData() {
        if (courseInfoData) {
          return courseInfoData;
        }

        if (textDataLoadPromise) {
          return textDataLoadPromise;
        }

        textDataLoadState = 'loading';
        updateHelperText();
        updateActionState();

        textDataLoadPromise = (async function () {
          var lastError = null;

          for (var i = 0; i < TEXT_DATA_SOURCE_URLS.length; i += 1) {
            var sourceUrl = TEXT_DATA_SOURCE_URLS[i];

            try {
              var response = await fetch(sourceUrl);
              if (!response.ok) {
                throw new Error('status ' + String(response.status));
              }

              var json = await response.json();
              courseInfoData = json;
              textDataLoadState = 'ready';
              updateHelperText();
              updateActionState();
              console.log('[TextData] loaded from', sourceUrl);
              return courseInfoData;
            } catch (error) {
              lastError = error;
              console.warn('[TextData] failed to load from', sourceUrl, error);
            }
          }

          textDataLoadState = 'error';
          textDataLoadPromise = null;
          updateHelperText();
          updateActionState();
          throw lastError || new Error('텍스트 데이터를 불러오지 못했어요.');
        })();

        return textDataLoadPromise;
      }

      function getCourseInfoRows(courseCategory) {
        if (!courseInfoData || !courseCategory) {
          return [];
        }

        return courseInfoData[courseCategory] || [];
      }

      function createDateRangeValues(textType) {
        var startDate = getTodayDate();
        var endDate = new Date(startDate.getTime());
        endDate.setMonth(endDate.getMonth() + 3);

        var dates = [];
        var currentDate = new Date(startDate.getTime());

        while (currentDate.getTime() <= endDate.getTime()) {
          dates.push(formatDate(currentDate, textType));
          currentDate.setDate(currentDate.getDate() + 1);
        }

        return dates;
      }

      function getTodayDate() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0, 0);
      }

      function formatDate(date, textType) {
        var year = date.getFullYear();
        var shortYear = String(year).slice(-2);
        var month = padNumber(date.getMonth() + 1);
        var day = padNumber(date.getDate());

        if (textType === 'date_yy') {
          return shortYear + '.' + month + '.' + day;
        }

        return String(year) + '.' + month + '.' + day;
      }

      function padNumber(value) {
        if (value < 10) {
          return '0' + String(value);
        }

        return String(value);
      }

      function getTextValuesForApply() {
        if (state.textType === 'date_yyyy' || state.textType === 'date_yy') {
          return createDateRangeValues(state.textType);
        }

        if (!state.courseCategory) {
          return null;
        }

        var rows = getCourseInfoRows(state.courseCategory);

        if (state.textType === 'creator_name') {
          return rows.map(function (item) {
            return item.creator_name;
          });
        }

        if (state.textType === 'job_title') {
          return rows.map(function (item) {
            return item.job_title;
          });
        }

        if (state.textType === 'job_creator') {
          return rows.map(function (item) {
            return item.job_title + ' ' + item.creator_name;
          });
        }

        return rows
          .map(function (item) {
            return item.course_title || '';
          })
          .filter(function (value) {
            return value.length > 0;
          });
      }

      async function postApplyMessage() {
        if (isCourseInfoType(state.textType)) {
          try {
            await ensureCourseInfoData();
          } catch (error) {
            parent.postMessage(
              {
                pluginMessage: {
                  type: 'show-toast',
                  message: '텍스트 데이터를 불러오지 못했어요.'
                }
              },
              '*'
            );
            return;
          }
        }

        var values = getTextValuesForApply();
        if (!values || values.length === 0) {
          parent.postMessage(
            {
              pluginMessage: {
                type: 'show-toast',
                message: '선택한 데이터 유형에 사용할 값이 없어요.'
              }
            },
            '*'
          );
          return;
        }

        parent.postMessage(
          {
            pluginMessage: {
              type: 'apply-random',
              values: values,
              successLabel: TEXT_TYPE_LABELS[state.textType]
            }
          },
          '*'
        );
      }

      function setImageStatus(message) {
        if (imageStatusText) {
          imageStatusText.textContent = message;
        }
        console.log('[ImageStatus]', message);
      }

      function setCreatorStatus(message) {
        if (creatorStatusText) {
          creatorStatusText.textContent = message;
        }
        console.log('[CreatorStatus]', message);
      }

      async function loadImageAsset(imageUrl) {
        var response = await fetch(imageUrl);

        if (!response.ok) {
          throw new Error('이미지 응답 오류: ' + imageUrl + ' / status ' + String(response.status));
        }

        var contentType = response.headers.get('content-type') || '';
        if (
          contentType.indexOf('image/png') === -1 &&
          contentType.indexOf('image/jpeg') === -1 &&
          contentType.indexOf('image/gif') === -1
        ) {
          throw new Error('지원되지 않는 이미지 타입: ' + imageUrl + ' / ' + contentType);
        }

        var arrayBuffer = await response.arrayBuffer();
        return {
          url: imageUrl,
          bytes: new Uint8Array(arrayBuffer)
        };
      }

      async function postImageApplyMessage(requestId) {
        await ensureImageData();

        var sourceCategory = state.imageView === 'creator' ? state.creatorFilterCategory : state.imageCategory;
        var creatorOptions = getImageCreatorOptions(sourceCategory);
        var selectedCreator = getSelectedCreator(state.creatorFilterCategory);
        var targetOptions = [];
        var messageCategory = sourceCategory;

        if (state.imageType === 'creator') {
          if (creatorOptions.length === 0) {
            return;
          }
          targetOptions = state.imageView === 'creator' && selectedCreator ? [selectedCreator] : creatorOptions;
        } else {
          messageCategory = state.thumbnailCategory;
          targetOptions = getThumbnailVariantOptions(state.thumbnailCategory, state.imageType);
          if (targetOptions.length === 0) {
            return;
          }
        }

        try {
          setImageStatus('이미지 적용 버튼 클릭됨. 이미지를 준비하는 중이에요...');
          parent.postMessage(
            {
              pluginMessage: {
                type: 'image-apply-start',
                requestId: requestId
              }
            },
            '*'
          );

          var imageAssets = [];

          for (var i = 0; i < targetOptions.length; i += 1) {
            setImageStatus('이미지 데이터 준비 중... ' + String(i + 1) + '/' + String(targetOptions.length));
            imageAssets.push(await loadImageAsset(targetOptions[i].url));
          }

          setImageStatus(String(imageAssets.length) + '개 이미지 준비 완료. 플러그인에 적용 요청을 보내는 중이에요...');

          parent.postMessage(
            {
              pluginMessage: {
                type: 'apply-image-random',
                requestId: requestId,
                imageType: state.imageType,
                imageCategory: messageCategory,
                imageAssets: imageAssets
              }
            },
            '*'
          );

          setImageStatus('적용 요청을 보냈어요. 결과 토스트를 확인해 주세요.');
        } catch (error) {
          var errorMessage = error && error.message ? error.message : 'Failed to fetch';
          parent.postMessage(
            {
              pluginMessage: {
                type: 'image-apply-prep-error',
                requestId: requestId,
                message: errorMessage
              }
            },
            '*'
          );
          setImageStatus('이미지 준비 단계 오류: ' + errorMessage);
        }
      }

      window.onmessage = function (event) {
        var pluginMessage = event.data && event.data.pluginMessage;
        if (!pluginMessage) {
          return;
        }

        if (pluginMessage.type !== 'image-apply-state') {
          return;
        }

        if (pluginMessage.requestId !== state.imageApplyRequestId) {
          return;
        }

        state.isApplyingImage = false;
        updateActionState();
      };

      for (var i = 0; i < tabButtons.length; i += 1) {
        tabButtons[i].addEventListener('click', function (event) {
          updateTab(event.currentTarget.getAttribute('data-tab'));
        });
      }

      for (var j = 0; j < typeButtons.length; j += 1) {
        typeButtons[j].addEventListener('click', function (event) {
          updateTypeSelection(event.currentTarget.getAttribute('data-text-type'));
        });
      }

      for (var m = 0; m < imageTypeButtons.length; m += 1) {
        imageTypeButtons[m].addEventListener('click', function (event) {
          updateImageTypeSelection(event.currentTarget.getAttribute('data-image-type'));
        });
      }

      for (var n = 0; n < imageCategoryButtons.length; n += 1) {
        imageCategoryButtons[n].addEventListener('click', function (event) {
          updateImageCategorySelection(event.currentTarget.getAttribute('data-image-category'));
        });
      }

      for (var o = 0; o < thumbnailCategoryButtons.length; o += 1) {
        thumbnailCategoryButtons[o].addEventListener('click', function (event) {
          updateThumbnailCategorySelection(event.currentTarget.getAttribute('data-thumbnail-category'));
        });
      }

      for (var p = 0; p < creatorFilterCategoryButtons.length; p += 1) {
        creatorFilterCategoryButtons[p].addEventListener('click', function (event) {
          updateCreatorFilterCategory(event.currentTarget.getAttribute('data-creator-filter-category'));
        });
      }

      openCreatorPageButton.addEventListener('click', function () {
        renderCreatorList();
        updateImageView('creator');
      });

      backToImageMainButton.addEventListener('click', function () {
        updateImageView('main');
      });

      for (var k = 0; k < categoryButtons.length; k += 1) {
        categoryButtons[k].addEventListener('click', function (event) {
          if (event.currentTarget.disabled) {
            return;
          }

          updateCourseCategory(event.currentTarget.getAttribute('data-course-category'));
        });
      }

      randomButton.addEventListener('click', function () {
        if (randomButton.disabled) {
          return;
        }

        if (state.activeTab === 'image') {
          state.imageApplyRequestId += 1;
          var requestId = state.imageApplyRequestId;
          state.isApplyingImage = true;
          updateActionState();

          postImageApplyMessage(requestId).catch(function (error) {
            if (requestId !== state.imageApplyRequestId) {
              return;
            }

            state.isApplyingImage = false;
            updateActionState();
            console.error(error);
            var errorMessage = error && error.message ? error.message : '알 수 없는 오류';
            setImageStatus('이미지 준비 단계 오류: ' + errorMessage);
          });
          return;
        }

        postApplyMessage().catch(function (error) {
          console.error(error);
          parent.postMessage(
            {
              pluginMessage: {
                type: 'show-toast',
                message: '텍스트 데이터를 불러오지 못했어요.'
              }
            },
            '*'
          );
        });
      });

      ensureCourseInfoData().catch(function (error) {
        console.warn('[TextData] initial load failed', error);
      });
      ensureImageData().catch(function (error) {
        console.warn('[ImageData] initial load failed', error);
      });

      updateTypeSelection('creator_name');
      updateImageTypeSelection('creator');
      updateImageCategorySelection('baking');
      updateThumbnailCategorySelection('baking');
      updateCreatorFilterCategory('all');
      renderCreatorList();
      updateImageView('main');
      updateTab('image');
    </script>
  </body>
</html>
